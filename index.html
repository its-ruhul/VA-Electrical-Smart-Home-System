<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>va-electrical-smart-home-system</title>
</head>

<body>
  <div class="header finisher-header" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script src="https://cdn.jsdelivr.net/npm/finisher-header@1.0.1/finisher-header.es5.min.js" type="text/javascript"></script>
  <script type="text/javascript">
    new FinisherHeader({
      "count": 6,
      "size": {
        "min": 1100,
        "max": 1300,
        "pulse": 0
      },
      "speed": {
        "x": {
          "min": 0.1,
          "max": 0.3
        },
        "y": {
          "min": 0.1,
          "max": 0.3
        }
      },
      "colors": {
        "background": "#9138e5",
        "particles": [
          "#6bd6ff",
          "#ffcb57",
          "#ff333d"
        ]
      },
      "blending": "overlay",
      "opacity": {
        "center": 1,
        "edge": 0.1
      },
      "skew": -2,
      "shapes": [
        "c"
      ]
    });
  </script>
